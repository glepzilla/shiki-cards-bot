services:
  renderer:
    build:
      context: .
      dockerfile: renderer/Dockerfile
    environment:
      RENDERER_TOKEN: ${RENDERER_TOKEN:-dev-renderer-token}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  rendered-permissions:
    build: .
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /app/.cache/rendered && chown -R 10001:10001 /app/.cache/rendered"]
    volumes:
      - rendered:/app/.cache/rendered
    restart: "no"

  bot:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      RENDERER_URL: http://renderer:3000
      RENDERER_TOKEN: ${RENDERER_TOKEN:-dev-renderer-token}
    volumes:
      - rendered:/app/.cache/rendered
    restart: unless-stopped
    depends_on:
      rendered-permissions:
        condition: service_completed_successfully
      renderer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  rendered:
