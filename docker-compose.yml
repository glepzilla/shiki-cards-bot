services:
  bot:
    image: ghcr.io/glepzilla/shiki-cards-bot:latest    # ← неймспейс орги!
    restart: unless-stopped
    env_file: .env
    environment:
      # The proxy runs on the Docker host. It must listen on the Docker bridge,
      # not only on the host's loopback address (see README).
      PROXY_URL: http://host.docker.internal:7890
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      NO_PROXY: localhost,127.0.0.1,::1
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - rendered:/app/.cache/rendered
    networks: [proxy]
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.shiki.rule=Host(`shiki.glepzilla.ru`)
      - traefik.http.routers.shiki.entrypoints=websecure
      - traefik.http.services.shiki.loadbalancer.server.port=8080

volumes:
  rendered:

networks:
  proxy:
    external: true
