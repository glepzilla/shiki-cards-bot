services:
  rendered-permissions:
    image: ghcr.io/glepzilla/shiki-cards-bot:latest
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /app/.cache/rendered && chown -R 10001:10001 /app/.cache/rendered"]
    volumes:
      - rendered:/app/.cache/rendered
    restart: "no"

  renderer:
    # Built in GitHub Actions: do not run npm/skia installation on the VPS.
    image: ghcr.io/glepzilla/shiki-cards-bot-renderer:latest
    environment:
      RENDERER_TOKEN: ${RENDERER_TOKEN:?set RENDERER_TOKEN in .env}
    networks: [proxy]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    image: ghcr.io/glepzilla/shiki-cards-bot:latest    # ← неймспейс орги!
    restart: unless-stopped
    depends_on:
      rendered-permissions:
        condition: service_completed_successfully
      renderer:
        condition: service_healthy
    env_file: .env
    environment:
      # The proxy runs on the Docker host. It must listen on the Docker bridge,
      # not only on the host's loopback address (see README).
      # Only selected upstreams use this proxy in application code; a global
      # container proxy would send Shikimori through the slow route.
      PROXY_URL: http://host.docker.internal:7890
      RENDERER_URL: http://renderer:3000
      RENDERER_TOKEN: ${RENDERER_TOKEN:?set RENDERER_TOKEN in .env}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - rendered:/app/.cache/rendered
    networks: [proxy]
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.shiki.rule=Host(`shiki.glepzilla.ru`)
      - traefik.http.routers.shiki.entrypoints=websecure
      - traefik.http.services.shiki.loadbalancer.server.port=8080

volumes:
  rendered:

networks:
  proxy:
    external: true
