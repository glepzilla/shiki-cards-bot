name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install locked development dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check bot tests
      - name: Type check
        run: uv run mypy
      - name: Test
        run: uv run pytest

  build:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Decrypt secrets
        run: sops -d secrets.enc.env > .env
        env:
          SOPS_AGE_KEY_FILE: /home/runner/.config/sops/age/keys.txt
      - name: Deploy
        run: |
          docker compose pull
          docker compose up -d
          docker image prune -f
      - name: Cleanup plaintext
        if: always()
        run: rm -f .env
